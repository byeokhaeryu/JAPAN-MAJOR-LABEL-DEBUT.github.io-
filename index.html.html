<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>J-ROCK BAND · 멤버 모집</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>
<style>
  :root {
    --bg: #0b0b0c;
    --bg-2: #161618;
    --surface: #141416;
    --surface-2: #1b1b1e;
    --line: #29292d;
    --line-strong: #3a3a40;
    --ink: #f4f4f5;
    --ink-2: #a7a7ad;
    --ink-3: #6c6c73;
    --stroke: rgba(244, 244, 245, 0.5);

    --font-sans: "Pretendard Variable", Pretendard, -apple-system,
      BlinkMacSystemFont, "Apple SD Gothic Neo", "Hiragino Kaku Gothic ProN",
      "Noto Sans JP", "Noto Sans KR", "Malgun Gothic", "Yu Gothic", system-ui,
      sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo,
      Consolas, monospace;

    --wrap: 940px;
    --pad-x: clamp(20px, 5vw, 48px);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto;
    }
  }

  body {
    margin: 0;
    background:
      radial-gradient(120% 80% at 50% -10%, #1c1c20 0%, transparent 55%),
      linear-gradient(180deg, #0c0c0d 0%, #131315 100%);
    background-color: var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  ::selection {
    background: var(--ink);
    color: #000;
  }

  .wrap {
    max-width: var(--wrap);
    margin: 0 auto;
    padding-inline: var(--pad-x);
  }

  /* ── eyebrow / utility type ───────────────────────── */
  .eyebrow {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ── top nav ──────────────────────────────────────── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(11, 11, 12, 0.72);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border-bottom: 1px solid var(--line);
  }
  .nav__inner {
    max-width: var(--wrap);
    margin: 0 auto;
    padding: 14px var(--pad-x);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand {
    font-size: 0.82rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    color: var(--ink);
    white-space: nowrap;
  }
  .brand b {
    color: var(--ink-3);
    font-weight: 800;
  }

  .langs {
    display: inline-flex;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    overflow: hidden;
    background: var(--surface);
  }
  .lang-btn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--ink-3);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    transition: color 0.18s ease, background 0.18s ease;
  }
  .lang-btn[aria-pressed="true"] {
    background: var(--ink);
    color: #000;
  }
  .lang-btn:not([aria-pressed="true"]):hover {
    color: var(--ink);
  }

  /* ── hero ─────────────────────────────────────────── */
  .hero {
    padding-top: clamp(56px, 11vw, 104px);
    padding-bottom: clamp(40px, 8vw, 72px);
    border-bottom: 1px solid var(--line);
  }
  .hero__subtitle {
    margin: 18px 0 6px;
    font-size: clamp(1.05rem, 3.4vw, 1.7rem);
    font-weight: 600;
    color: var(--ink-2);
    letter-spacing: -0.01em;
  }
  .hero__title {
    margin: 0;
    font-size: clamp(3rem, 14vw, 8rem);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .hero__mark-row {
    margin-top: clamp(22px, 4vw, 38px);
    display: flex;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: clamp(16px, 4vw, 40px);
  }
  .hero__mark {
    font-size: clamp(2.6rem, 11vw, 6rem);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--stroke);
    text-stroke: 1.5px var(--stroke);
    user-select: none;
  }
  .hero__concept {
    padding-bottom: 6px;
  }
  .hero__concept span {
    display: block;
    font-size: clamp(0.95rem, 2.6vw, 1.15rem);
    color: var(--ink-2);
    font-weight: 500;
  }
  .hero__concept span + span {
    color: var(--ink-3);
  }

  /* ── concept band ─────────────────────────────────── */
  .concept {
    padding: clamp(40px, 7vw, 72px) 0;
    border-bottom: 1px solid var(--line);
  }
  .concept__title {
    margin: 14px 0 8px;
    font-size: clamp(1.6rem, 5.5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.12;
  }
  .concept__sub {
    margin: 0;
    color: var(--ink-2);
    font-size: clamp(1rem, 3vw, 1.2rem);
  }

  /* ── track selector ───────────────────────────────── */
  .track {
    padding: clamp(44px, 7vw, 76px) 0 clamp(20px, 3vw, 28px);
  }
  .track__title {
    margin: 14px 0 8px;
    font-size: clamp(1.4rem, 4.6vw, 2.1rem);
    font-weight: 800;
    letter-spacing: -0.015em;
  }
  .track__hint {
    margin: 0 0 26px;
    color: var(--ink-3);
    font-size: clamp(0.92rem, 2.6vw, 1rem);
    max-width: 46ch;
  }
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .tab {
    appearance: none;
    flex: 1 1 200px;
    min-width: 0;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink-2);
    font-family: var(--font-sans);
    font-size: clamp(1rem, 3vw, 1.15rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    padding: 18px 20px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s ease, background 0.2s ease,
      color 0.2s ease, transform 0.2s ease;
  }
  .tab:hover {
    border-color: var(--ink-3);
    color: var(--ink);
  }
  .tab[aria-selected="true"] {
    background: var(--ink);
    border-color: var(--ink);
    color: #000;
  }

  /* ── track content ────────────────────────────────── */
  #trackContent {
    transition: opacity 0.18s ease;
  }
  .sec {
    padding: clamp(34px, 5.5vw, 56px) 0;
    border-top: 1px solid var(--line);
  }
  .sec__head {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px 16px;
    margin-bottom: 22px;
  }
  .sec__title {
    margin: 6px 0 0;
    flex: 1 1 auto;
    width: 100%;
    font-size: clamp(1.5rem, 5vw, 2.3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .badge {
    align-self: flex-start;
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    padding: 5px 12px;
    white-space: nowrap;
  }

  .position {
    margin: 0 0 18px;
    font-size: clamp(1.7rem, 6.5vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .notes {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .notes li {
    color: var(--ink-2);
    font-size: clamp(0.95rem, 2.6vw, 1.05rem);
  }
  .notes li + li {
    margin-top: 2px;
    color: var(--ink-3);
  }

  .quals {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .qual {
    display: flex;
    gap: 16px;
    align-items: baseline;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
    font-size: clamp(0.98rem, 2.8vw, 1.12rem);
  }
  .qual:last-child {
    border-bottom: 0;
  }
  .qual__mark {
    flex: none;
    width: 18px;
    height: 1px;
    margin-top: 0.7em;
    background: var(--ink-3);
  }

  .roadmap__note {
    margin: 0 0 26px;
    color: var(--ink-3);
    font-size: clamp(0.92rem, 2.6vw, 1rem);
    max-width: 52ch;
  }
  .roadmap {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .phase {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 18px 22px;
  }
  .phase__tag {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    padding-bottom: 12px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .phase__title {
    font-size: clamp(1.02rem, 3vw, 1.18rem);
    font-weight: 800;
    letter-spacing: -0.01em;
    margin-bottom: 7px;
  }
  .phase__desc {
    color: var(--ink-2);
    font-size: 0.92rem;
    line-height: 1.55;
  }

  /* ── apply ────────────────────────────────────────── */
  .apply {
    padding: clamp(44px, 7vw, 80px) 0;
    border-top: 1px solid var(--line);
  }
  .apply__title {
    margin: 14px 0 18px;
    font-size: clamp(1.7rem, 6vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .apply__intro {
    margin: 0 0 14px;
    color: var(--ink);
    font-size: clamp(1rem, 2.8vw, 1.12rem);
    font-weight: 500;
  }
  .apply__steps {
    list-style: none;
    margin: 0 0 34px;
    padding: 0;
    counter-reset: step;
  }
  .apply__steps li {
    position: relative;
    counter-increment: step;
    padding: 8px 0 8px 38px;
    color: var(--ink-2);
    font-size: clamp(0.95rem, 2.6vw, 1.05rem);
  }
  .apply__steps li::before {
    content: counter(step, decimal-leading-zero);
    position: absolute;
    left: 0;
    top: 8px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--ink-3);
  }

  .cta {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: stretch;
  }
  .kakao-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kakao {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--ink);
    color: #000;
    font-weight: 800;
    font-size: clamp(0.98rem, 2.7vw, 1.08rem);
    letter-spacing: -0.01em;
    text-decoration: none;
    padding: 16px 26px;
    border-radius: 4px;
    border: 1px solid var(--ink);
    transition: transform 0.16s ease, opacity 0.16s ease;
  }
  .kakao::before {
    content: "";
    width: 17px;
    height: 17px;
    background: #000;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3C6.5 3 2 6.6 2 11c0 2.8 1.9 5.3 4.7 6.7-.2.7-.8 2.8-.9 3.2 0 0 0 .3.2.4.2 0 .3 0 .4-.1.3-.2 3-2 3.9-2.7.5.1 1.1.1 1.6.1 5.5 0 10-3.6 10-8S17.5 3 12 3z'/></svg>")
      center / contain no-repeat;
    mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3C6.5 3 2 6.6 2 11c0 2.8 1.9 5.3 4.7 6.7-.2.7-.8 2.8-.9 3.2 0 0 0 .3.2.4.2 0 .3 0 .4-.1.3-.2 3-2 3.9-2.7.5.1 1.1.1 1.6.1 5.5 0 10-3.6 10-8S17.5 3 12 3z'/></svg>")
      center / contain no-repeat;
  }
  .kakao:hover {
    transform: translateY(-2px);
  }
  .kakao__sub {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--ink-3);
    padding-left: 2px;
  }

  .email-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1 1 260px;
    min-width: 0;
  }
  .email-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--ink-3);
    padding-left: 2px;
  }
  .email {
    appearance: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 15px 18px;
    cursor: pointer;
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    letter-spacing: 0.01em;
    transition: border-color 0.18s ease, background 0.18s ease;
    text-align: left;
  }
  .email:hover {
    border-color: var(--ink-3);
    background: var(--surface-2);
  }
  .email__copy {
    flex: none;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    padding: 4px 8px;
  }

  /* ── footer ───────────────────────────────────────── */
  .footer {
    border-top: 1px solid var(--line);
    padding: 28px 0 40px;
    text-align: center;
  }
  .footer p {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--ink-3);
  }

  /* ── toast ────────────────────────────────────────── */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translate(-50%, 16px);
    background: var(--ink);
    color: #000;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* ── reveal on scroll ─────────────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal.in {
    opacity: 1;
    transform: none;
  }

  :focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
    .kakao:hover,
    .tab:hover {
      transform: none;
    }
  }

  /* ── responsive ───────────────────────────────────── */
  @media (max-width: 640px) {
    .roadmap {
      grid-template-columns: 1fr;
    }
    .hero__mark-row {
      align-items: flex-start;
    }
    .nav__inner {
      gap: 10px;
    }
    .brand {
      font-size: 0.74rem;
    }
    .cta {
      flex-direction: column;
    }
    .kakao {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <!-- NAV -->
  <header class="nav">
    <div class="nav__inner">
      <span class="brand">J-ROCK <b>BAND</b></span>
      <div class="langs" role="group" id="langGroup" aria-label="언어 선택">
        <button class="lang-btn" data-lang="ko" aria-pressed="true">KOR</button>
        <button class="lang-btn" data-lang="ja" aria-pressed="false">JPN</button>
      </div>
    </div>
  </header>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="wrap">
        <span class="eyebrow" id="heroEyebrow">JAPAN · MAJOR LABEL DEBUT</span>
        <p class="hero__subtitle" id="heroSubtitle"></p>
        <h1 class="hero__title" id="heroTitle"></h1>
        <div class="hero__mark-row">
          <div class="hero__mark">J-ROCK</div>
          <div class="hero__concept">
            <span id="heroConcept1"></span>
            <span id="heroConcept2"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- CONCEPT -->
    <section class="concept reveal">
      <div class="wrap">
        <span class="eyebrow" id="conceptEyebrow">BAND CONCEPT</span>
        <h2 class="concept__title" id="conceptTitle"></h2>
        <p class="concept__sub" id="conceptSub"></p>
      </div>
    </section>

    <!-- TRACK SELECTOR -->
    <section class="track reveal">
      <div class="wrap">
        <span class="eyebrow">SELECT TRACK</span>
        <h2 class="track__title" id="trackTitle"></h2>
        <p class="track__hint" id="trackHint"></p>
        <div class="tabs" role="tablist" id="tabs" aria-label="모집 트랙">
          <button class="tab" data-track="kr" role="tab" aria-selected="true"></button>
          <button class="tab" data-track="jp" role="tab" aria-selected="false"></button>
        </div>
      </div>
    </section>

    <!-- TRACK CONTENT (re-rendered) -->
    <div class="wrap">
      <div id="trackContent"></div>
    </div>

    <!-- APPLY -->
    <section class="apply reveal">
      <div class="wrap">
        <span class="eyebrow">HOW TO APPLY</span>
        <h2 class="apply__title" id="applyTitle"></h2>
        <p class="apply__intro" id="applyIntro"></p>
        <ul class="apply__steps" id="applySteps"></ul>

        <div class="cta">
          <div class="kakao-wrap">
            <a class="kakao" id="kakaoBtn" href="#" target="_blank" rel="noopener noreferrer">
              <span id="kakaoBtnText"></span>
            </a>
            <span class="kakao__sub" id="kakaoSub"></span>
          </div>
          <div class="email-wrap">
            <span class="email-label" id="emailLabel"></span>
            <button class="email" id="emailBtn" type="button">
              <span class="email__addr" id="emailAddr"></span>
              <span class="email__copy">COPY</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="wrap">
      <p id="footer"></p>
    </div>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    /* ════════════════════════════════════════════════
       편집 포인트 — 아래 두 값만 바꾸면 됩니다.
       kakaoOpenChatUrl: 실제 카카오톡 오픈채팅 링크로 교체
       contactEmail    : 문의 메일 주소
    ════════════════════════════════════════════════ */
    const CONFIG = {
      kakaoOpenChatUrl: "https://open.kakao.com/o/sxrgoR1h",
      contactEmail: "gingarlsrk@naver.com",
    };

    const i18n = {
      ko: {
        docTitle: "J-ROCK BAND · 멤버 모집",
        hero: {
          subtitle: "일본 메이저 밴드 데뷔",
          title: "멤버 모집",
          concept1: "대중적인 멜로디의 J-ROCK",
          concept2: "SPYAIR 스타일 지향",
        },
        concept: {
          title: "대중적인 멜로디의 J-ROCK",
          sub: "SPYAIR(스파이에어) 스타일 지향",
        },
        track: {
          title: "모집 트랙 선택",
          hint: "지원하려는 멤버 유형을 선택하세요. 포지션 인원과 로드맵이 달라집니다.",
          tabKr: "🇰🇷 한국인 멤버",
          tabJp: "🇯🇵 일본인 멤버",
        },
        sec: { position: "모집 포지션", who: "지원 자격", roadmap: "로드맵", apply: "지원 방법" },
        apply: {
          intro: "카카오톡 또는 메일로 편하게 문의해 주세요.",

    let lang = "ko";
    let track = "kr";

    const $ = (id) => document.getElementById(id);

    function setText(id, value) {
      const el = $(id);
      if (el) el.textContent = value;
    }

    function trackHTML(L, t) {
      const T = L.tracks[t];
      const notes = T.notes.map((n) => `<li>${n}</li>`).join("");
      const quals = T.quals
        .map((q) => `<li class="qual"><span class="qual__mark"></span><span>${q}</span></li>`)
        .join("");
      const phases = T.phases
        .map(
          (p) => `
        <div class="phase">
          <div class="phase__tag">${p.tag}</div>
          <div class="phase__title">${p.title}</div>
          <div class="phase__desc">${p.desc}</div>
        </div>`
        )
        .join("");

      return `
        <section class="sec">
          <div class="sec__head">
            <div style="flex:1 1 auto;width:100%;">
              <span class="eyebrow">POSITION</span>
              <h2 class="sec__title">${L.sec.position}</h2>
            </div>
            <span class="badge">${T.badge}</span>
          </div>
          <p class="position">${T.position}</p>
          <ul class="notes">${notes}</ul>
        </section>

        <section class="sec">
          <div class="sec__head">
            <span class="eyebrow">WHO WE WANT</span>
            <h2 class="sec__title">${L.sec.who}</h2>
          </div>
          <ul class="quals">${quals}</ul>
        </section>

        <section class="sec">
          <div class="sec__head">
            <span class="eyebrow">ROADMAP</span>
            <h2 class="sec__title">${L.sec.roadmap}</h2>
          </div>
          <p class="roadmap__note">${T.roadmapNote}</p>
          <div class="roadmap">${phases}</div>
        </section>
      `;
    }

    function renderCommon() {
      const L = i18n[lang];
      document.documentElement.lang = lang === "ja" ? "ja" : "ko";
      document.title = L.docTitle;

      setText("heroSubtitle", L.hero.subtitle);
      setText("heroTitle", L.hero.title);
      setText("heroConcept1", L.hero.concept1);
      setText("heroConcept2", L.hero.concept2);

      setText("conceptTitle", L.concept.title);
      setText("conceptSub", L.concept.sub);

      setText("trackTitle", L.track.title);
      setText("trackHint", L.track.hint);

      const tabBtns = document.querySelectorAll("#tabs .tab");
      tabBtns.forEach((b) => {
        b.textContent = b.dataset.track === "kr" ? L.track.tabKr : L.track.tabJp;
        const on = b.dataset.track === track;
        b.setAttribute("aria-selected", on ? "true" : "false");
      });

      setText("applyTitle", L.sec.apply);
      setText("applyIntro", L.apply.intro);
      $("applySteps").innerHTML = L.apply.steps.map((s) => `<li>${s}</li>`).join("");
      setText("kakaoBtnText", L.apply.kakaoBtn);
      setText("kakaoSub", L.apply.kakaoSub);
      setText("emailLabel", L.apply.emailLabel);
      setText("emailAddr", CONFIG.contactEmail);
      setText("footer", L.footer);

      $("kakaoBtn").href = CONFIG.kakaoOpenChatUrl;

      document.querySelectorAll("#langGroup .lang-btn").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.lang === lang ? "true" : "false");
      });
    }

    function renderTrack(animate) {
      const L = i18n[lang];
      const box = $("trackContent");
      const paint = () => {
        box.innerHTML = trackHTML(L, track);
        box.style.opacity = "1";
      };
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (animate && !reduce) {
        box.style.opacity = "0";
        setTimeout(paint, 150);
      } else {
        paint();
      }
    }

    function render(animateTrack) {
      renderCommon();
      renderTrack(animateTrack);
    }

    /* ── toast + copy ─────────────────────── */
    let toastTimer;
    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    async function copyEmail() {
      const text = CONFIG.contactEmail;
      const L = i18n[lang];
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(ta);
          if (!ok) throw new Error("execCommand failed");
        }
        toast(L.apply.copied);
      } catch (e) {
        toast(L.apply.copyFail);
      }
    }

    /* ── events ───────────────────────────── */
    document.getElementById("langGroup").addEventListener("click", (e) => {
      const btn = e.target.closest(".lang-btn");
      if (!btn || btn.dataset.lang === lang) return;
      lang = btn.dataset.lang;
      render(false);
    });

    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if (!btn || btn.dataset.track === track) return;
      track = btn.dataset.track;
      render(true);
    });

    document.getElementById("emailBtn").addEventListener("click", copyEmail);

    /* ── scroll reveal ────────────────────── */
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!reduce && "IntersectionObserver" in window) {
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((en) => {
            if (en.isIntersecting) {
              en.target.classList.add("in");
              io.unobserve(en.target);
            }
          });
        },
        { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
      );
      document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
    } else {
      document.querySelectorAll(".reveal").forEach((el) => el.classList.add("in"));
    }

    /* ── init ─────────────────────────────── */
    render(false);
  </script>
